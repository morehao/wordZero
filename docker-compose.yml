version: "3.9"

services:
  wordzero:
    build:
      context: ./apps/wordzero/script
      dockerfile: Dockerfile
    image: wordzero-server:latest
    container_name: wordzero-server
    ports:
      - "8080:8080"
    volumes:
      - ./data/wordzero.prod:/data/wordzero.prod
    environment:
      # 服务配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      # S3存储配置（根据实际情况修改）
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-wordzero}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-minioadmin}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX:-documents}
      - S3_USE_PATH_STYLE=${S3_USE_PATH_STYLE:-true}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-http://localhost:9000/wordzero}
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    command: -c /data/wordzero.prod/conf/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MinIO作为本地S3兼容存储（用于开发/测试）
  minio:
    image: minio/minio:latest
    container_name: wordzero-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  minio_data:
    driver: local
